name: orpheus
description: "A premium local music & video player inspired by Tidal's dark aesthetic."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1   # bundles the Isar native binary for all platforms

  # ── Storage ───────────────────────────────────────────────
  path_provider: ^2.1.4

  # ── Media metadata (ID3 / Vorbis / MP4 tags + cover art) ──
  metadata_god: ^1.1.0

  # ── Audio playback ────────────────────────────────────────
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7

  # ── Network ───────────────────────────────────────────────
  http: ^1.2.2

  # ── UI ────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code generation ───────────────────────────────────────
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

# ── Version overrides ──────────────────────────────────────────────────────
# metadata_god's precompiled Rust dylib was built against flutter_rust_bridge
# 2.11.1. Without this override the Dart-side runtime (2.12.0) is resolved,
# causing a "Bad state: codegen version mismatch" crash at app startup.
dependency_overrides:
  flutter_rust_bridge: 2.11.1
